<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Treasure Hunt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #score-bar {
      margin-top: 20px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #FFD700;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid rgba(255,215,0,0.35);
      letter-spacing: 1px;
    }

    #hints {
      position: absolute;
      bottom: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #status-text {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 26px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #nearest-badge {
      background: rgba(255,215,0,0.88);
      color: #1a1000;
      padding: 7px 20px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
    }

    /* ── Win screen ──────────────────────────────────────────────────────── */
    #win-screen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    #win-screen .trophy  { font-size: 80px; animation: pop 0.5s ease-out both; }
    #win-screen .title   { color: #FFD700; font-size: 30px; font-weight: 800; letter-spacing: 1px; }
    #win-screen .sub     { color: rgba(255,255,255,0.65); font-size: 15px; }

    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.25); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Individual collect flash */
    #collect-flash {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #FFD700;
      font-size: 28px;
      font-weight: 800;
      text-shadow: 0 0 20px rgba(255,215,0,0.9);
      pointer-events: none;
      animation: floatUp 1.2s ease-out both;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
      60%  { opacity: 1; transform: translate(-50%, -120%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
    }
  </style>
</head>
<body>

  <div id="hud">
    <div id="score-bar">0 / 0 collected</div>
    <div id="hints">
      <div id="status-text">Walk towards a glowing orb to collect it</div>
      <div id="nearest-badge" style="display:none">...</div>
    </div>
  </div>

  <div id="win-screen">
    <div class="trophy">🏆</div>
    <div class="title">All Treasures Found!</div>
    <div class="sub">Hunt complete — great job!</div>
  </div>

  <div id="collect-flash">⭐ Collected!</div>

  <!-- Three.js r158 — satisfies zappar-threejs >=0.154 peer dep -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <!-- ZapWorks Universal AR for Three.js (standalone CDN) -->
  <script src="https://libs.zappar.com/zappar-threejs/4.3.0/zappar-threejs.js"></script>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    //  TREASURE POINTS — edit this array to place your collectibles
    //
    //  Coordinates are in METRES, relative to where the user stands on launch.
    //  The coordinate origin (0, 0, 0) is the user's eye position at start.
    //
    //  X  →  positive = RIGHT of you,      negative = LEFT of you
    //  Y  →  positive = ABOVE eye level,   negative = below eye level
    //  Z  →  positive = BEHIND you,        negative = IN FRONT of you
    //
    //  Examples:
    //    { x: 0,  z: -3 }   →  3 m straight ahead
    //    { x: 2,  z: -3 }   →  3 m ahead + 2 m to the right
    //    { x: -1, z: -5 }   →  5 m ahead + 1 m to the left
    //    { x: 0,  z:  2 }   →  2 m directly behind you
    //
    //  "Forward" = whichever direction you face when the app first loads.
    //  There is no real-world compass without extra hardware.
    // ═══════════════════════════════════════════════════════════════════════════
    const TREASURES = [
      { label: 'Point A', x:  0, y: 0, z: -3  },   // 3 m straight ahead
      { label: 'Point B', x:  2, y: 0, z: -3  },   // 3 m ahead, 2 m right
      { label: 'Point C', x: -1, y: 0, z: -5  },   // 5 m ahead, 1 m left
    ];

    // Distance (metres) within which the user collects an orb
    const COLLECT_RADIUS = 0.9;

    // ── Renderer ───────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    ZapparThree.glContextSet(renderer.getContext());

    // ── Scene & ZapWorks camera ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new ZapparThree.Camera();
    scene.background = camera.backgroundTexture;

    // ── Instant World Tracker ──────────────────────────────────────────────────
    // Anchors the AR world to the physical space using visual odometry (no scan
    // or image target required). The anchor origin is set to the user's position
    // on startup; all TREASURES coordinates are relative to that origin.
    const tracker = new ZapparThree.InstantWorldTracker();
    const anchor  = new ZapparThree.InstantWorldAnchorGroup(camera, tracker);
    scene.add(anchor);
    tracker.setAnchorPoseFromCameraOffset(0, 0, 0);

    // ── Lighting ───────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    const sun = new THREE.DirectionalLight(0xffffff, 0.7);
    sun.position.set(2, 4, 3);
    scene.add(sun);

    // ── Build treasure orbs ────────────────────────────────────────────────────
    // Each orb = glowing sphere + spinning halo + vertical beam (floor pointer)
    const orbs = TREASURES.map(cfg => {
      const group = new THREE.Group();
      // Place at configured XZ, Y=0 means eye level at launch height
      group.position.set(cfg.x, cfg.y, cfg.z);
      anchor.add(group);

      // Glowing sphere — visible from all directions at eye level
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 28, 28),
        new THREE.MeshStandardMaterial({
          color:             0xFFD700,
          emissive:          0xFF9900,
          emissiveIntensity: 0.9,
          roughness:         0.15,
          metalness:         0.6,
        })
      );
      group.add(sphere);

      // Spinning halo ring around the sphere
      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(0.26, 0.016, 8, 48),
        new THREE.MeshBasicMaterial({ color: 0xFFE55C, transparent: true, opacity: 0.85 })
      );
      group.add(halo);

      // Vertical beam pointing down — helps locate the orb on the floor below
      // Extends ~2.2 m downward to reach the floor from eye-level anchor
      const BEAM_LEN = 2.2;
      const beam = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.012, BEAM_LEN, 8),
        new THREE.MeshBasicMaterial({ color: 0xFFD700, transparent: true, opacity: 0.35 })
      );
      beam.position.y = -(BEAM_LEN / 2); // hang down from sphere centre
      group.add(beam);

      // Floor disc at bottom of beam (easier to spot on the ground)
      const floorDisc = new THREE.Mesh(
        new THREE.CircleGeometry(0.22, 32),
        new THREE.MeshBasicMaterial({
          color: 0xFFD700, transparent: true, opacity: 0.55,
          side: THREE.DoubleSide,
        })
      );
      floorDisc.rotation.x = -Math.PI / 2;         // lie flat
      floorDisc.position.y = -BEAM_LEN;             // at floor (beam tip)
      group.add(floorDisc);

      // Warm point light around the orb
      const light = new THREE.PointLight(0xFFD700, 2.0, 3.0);
      group.add(light);

      return {
        group, sphere, halo, floorDisc, light,
        cfg,
        collected: false,
        worldPos: new THREE.Vector3(),
      };
    });

    // ── Camera permission ──────────────────────────────────────────────────────
    ZapparThree.permissionRequestUI().then(granted => {
      if (granted) camera.start();
      else ZapparThree.permissionDeniedUI();
    });

    // ── UI refs ────────────────────────────────────────────────────────────────
    const scoreBarEl    = document.getElementById('score-bar');
    const statusTextEl  = document.getElementById('status-text');
    const nearestBadge  = document.getElementById('nearest-badge');
    const winScreen     = document.getElementById('win-screen');
    const collectFlash  = document.getElementById('collect-flash');

    let collectedCount = 0;
    scoreBarEl.textContent = `0 / ${TREASURES.length} collected`;

    function showCollectFlash(label) {
      collectFlash.textContent = `⭐ ${label} collected!`;
      collectFlash.style.display = 'block';
      // Re-trigger CSS animation by cloning the node
      const clone = collectFlash.cloneNode(true);
      collectFlash.parentNode.replaceChild(clone, collectFlash);
      // Re-assign ref after DOM swap
      Object.assign(collectFlash, clone);
    }

    // ── Render loop ────────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      camera.updateFrame(renderer);

      if (collectedCount < TREASURES.length) {
        const t = Date.now() * 0.001;
        let closestDist  = Infinity;
        let closestLabel = '';

        orbs.forEach(orb => {
          if (orb.collected) return;

          // Animations
          const pulse = 1 + 0.11 * Math.sin(t * 2.4);
          orb.sphere.scale.setScalar(pulse);
          orb.halo.rotation.y = t * 1.6;
          orb.halo.rotation.x = Math.sin(t * 0.9) * 0.35;
          orb.floorDisc.scale.setScalar(0.9 + 0.1 * Math.sin(t * 2.4));
          orb.light.intensity = 1.5 + 1.0 * Math.sin(t * 2.4);

          // Proximity check in world space
          orb.group.getWorldPosition(orb.worldPos);
          const dist = camera.position.distanceTo(orb.worldPos);

          if (dist < closestDist) {
            closestDist  = dist;
            closestLabel = orb.cfg.label;
          }

          if (dist < COLLECT_RADIUS) {
            orb.collected = true;
            orb.group.visible = false;
            collectedCount++;
            scoreBarEl.textContent = `${collectedCount} / ${TREASURES.length} collected`;

            // Flash message
            const flash = document.getElementById('collect-flash');
            flash.textContent = `⭐ ${orb.cfg.label} collected!`;
            flash.style.animation = 'none';
            flash.offsetHeight; // reflow to restart animation
            flash.style.animation = '';
            flash.style.display = 'block';

            if (collectedCount === TREASURES.length) {
              document.getElementById('hud').style.display = 'none';
              winScreen.style.display = 'flex';
            }
          }
        });

        // Nearest hint
        if (collectedCount < TREASURES.length && closestDist < Infinity) {
          nearestBadge.style.display = 'block';
          nearestBadge.textContent   = `${closestLabel} — ${closestDist.toFixed(1)} m`;

          if (closestDist < 1.2) {
            statusTextEl.textContent = 'Almost there!';
          } else if (closestDist < 2.5) {
            statusTextEl.textContent = 'Getting warmer…';
          } else {
            statusTextEl.textContent = 'Walk towards a glowing orb';
          }
        }
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
