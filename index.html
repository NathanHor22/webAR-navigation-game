<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Treasure Hunt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Canvas sits at z-index 0 — all UI goes above it */
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    /* Shared screen base — hidden by default, shown via .visible */
    .screen {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .screen.visible { display: flex; }

    /* ── Place screen ──────────────────────────────────────────────────────── */
    #place-screen {
      justify-content: flex-end;
      padding-bottom: 60px;
      gap: 16px;
      pointer-events: none; /* screen itself doesn't block touches */
    }
    #place-hint {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 28px;
      font-size: 15px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      max-width: 300px;
    }
    #place-btn {
      pointer-events: all; /* re-enable on the button itself */
      background: #FFD700;
      color: #1a1000;
      border: none;
      padding: 16px 44px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      transition: opacity 0.3s;
    }
    #place-btn:disabled { opacity: 0.45; cursor: default; }

    /* ── Game HUD ──────────────────────────────────────────────────────────── */
    #hud { pointer-events: none; }
    #score-bar {
      margin-top: 22px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #FFD700;
      padding: 10px 26px;
      border-radius: 24px;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid rgba(255,215,0,0.3);
    }
    #bottom-hints {
      position: absolute;
      bottom: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    #status-text {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 26px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #nearest-badge {
      background: rgba(255,215,0,0.9);
      color: #1a1000;
      padding: 7px 20px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
    }

    /* ── Win screen ────────────────────────────────────────────────────────── */
    #win-screen {
      justify-content: center;
      gap: 18px;
      background: rgba(0,0,0,0.82);
      z-index: 20;
    }
    #win-screen .trophy { font-size: 80px; }
    #win-screen .title  { color: #FFD700; font-size: 30px; font-weight: 800; }
    #win-screen .sub    { color: rgba(255,255,255,0.65); font-size: 15px; }

    /* ── Collect flash ─────────────────────────────────────────────────────── */
    #collect-flash {
      display: none;
      position: fixed;
      z-index: 20;
      top: 42%; left: 50%;
      transform: translateX(-50%);
      color: #FFD700;
      font-size: 26px;
      font-weight: 800;
      white-space: nowrap;
      text-shadow: 0 0 24px rgba(255,215,0,0.9);
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(0.9); }
      50%  { opacity: 1; transform: translateX(-50%) translateY(-28px) scale(1.1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-56px) scale(1.0); }
    }
  </style>
</head>
<body>

  <!-- shown until user taps "Place Treasures" -->
  <div id="place-screen" class="screen visible">
    <div id="place-hint">Point camera at the room, then tap to drop the treasures</div>
    <button id="place-btn" disabled>Starting camera…</button>
  </div>

  <!-- shown after placement -->
  <div id="hud" class="screen">
    <div id="score-bar">0 / 0 collected</div>
    <div id="bottom-hints">
      <div id="status-text">Walk towards a glowing orb</div>
      <div id="nearest-badge">Searching…</div>
    </div>
  </div>

  <div id="win-screen" class="screen">
    <div class="trophy">🏆</div>
    <div class="title">All Treasures Found!</div>
    <div class="sub">Hunt complete — great job!</div>
  </div>

  <div id="collect-flash">⭐ Collected!</div>

  <!-- Three.js r158 (zappar-threejs peer dep: >=0.154) -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <!-- ZapWorks Universal AR — ThreeJS standalone CDN -->
  <script src="https://libs.zappar.com/zappar-threejs/4.3.0/zappar-threejs.js"></script>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    //  TREASURE CONFIG
    //
    //  Positions in METRES relative to where you stand when you tap "Place".
    //  "Forward" = the direction you face when you tap.
    //
    //    x: positive = RIGHT,    negative = LEFT
    //    z: negative = FORWARD,  positive = BEHIND
    //    (leave y at 0 — height is handled automatically)
    //
    //  Examples:
    //    { x:  0, z: -3 }   →  3 m straight ahead
    //    { x:  2, z: -3 }   →  3 m ahead + 2 m right
    //    { x: -1, z: -5 }   →  5 m ahead + 1 m left
    // ═══════════════════════════════════════════════════════════════════════════
    const TREASURES = [
      { label: 'Point A', x:  0, z: -3 },
      { label: 'Point B', x:  2, z: -3 },
      { label: 'Point C', x: -1, z: -5 },
    ];
    const COLLECT_RADIUS = 0.9; // metres

    // ── Renderer ───────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Insert canvas FIRST so all UI divs paint on top (they share z-index context)
    document.body.insertBefore(renderer.domElement, document.body.firstChild);
    ZapparThree.glContextSet(renderer.getContext());

    // ── Scene & ZapWorks camera ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new ZapparThree.Camera();
    scene.background = camera.backgroundTexture;

    // ── Instant World Tracker ──────────────────────────────────────────────────
    const tracker = new ZapparThree.InstantWorldTracker();
    const anchor  = new ZapparThree.InstantWorldAnchorGroup(camera, tracker);
    scene.add(anchor);

    // ── Lighting ───────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    const sun = new THREE.DirectionalLight(0xffffff, 0.7);
    sun.position.set(2, 4, 3);
    scene.add(sun);

    // ── Build orbs (hidden until placement) ───────────────────────────────────
    const orbs = TREASURES.map(cfg => {
      const group = new THREE.Group();
      group.position.set(cfg.x, 0, cfg.z); // Y=0 → same height as camera at tap
      group.visible = false;                // revealed on placement
      anchor.add(group);

      // Main sphere — large and bright enough to spot across a room
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 28, 28),
        new THREE.MeshStandardMaterial({
          color: 0xFFD700, emissive: 0xFF9900, emissiveIntensity: 1.0,
          roughness: 0.15, metalness: 0.6,
        })
      );
      group.add(sphere);

      // Spinning halo ring
      const halo = new THREE.Mesh(
        new THREE.TorusGeometry(0.3, 0.018, 8, 48),
        new THREE.MeshBasicMaterial({ color: 0xFFE55C, transparent: true, opacity: 0.9 })
      );
      group.add(halo);

      // Point light so the orb glows against real-world geometry
      const light = new THREE.PointLight(0xFFD700, 2.5, 3.5);
      group.add(light);

      return {
        group, sphere, halo, light,
        cfg, collected: false,
        worldPos: new THREE.Vector3(),
      };
    });

    // ── Camera permission ──────────────────────────────────────────────────────
    // Button stays disabled until the camera is live, so setAnchorPoseFromCameraOffset
    // is never called before the tracker has a valid camera pose.
    const placeBtn = document.getElementById('place-btn');

    ZapparThree.permissionRequestUI().then(granted => {
      if (granted) {
        camera.start();
        placeBtn.disabled    = false;
        placeBtn.textContent = 'Place Treasures';
      } else {
        ZapparThree.permissionDeniedUI();
      }
    });

    // ── Place button ───────────────────────────────────────────────────────────
    let gameStarted = false;

    placeBtn.addEventListener('click', () => {
      // Lock anchor to current camera pose
      tracker.setAnchorPoseFromCameraOffset(0, 0, 0);

      // Reveal all orbs
      orbs.forEach(orb => { orb.group.visible = true; });
      gameStarted = true;

      // Swap screens
      document.getElementById('place-screen').classList.remove('visible');
      document.getElementById('hud').classList.add('visible');
      document.getElementById('score-bar').textContent = `0 / ${TREASURES.length} collected`;
    });

    // ── UI refs ────────────────────────────────────────────────────────────────
    const scoreBarEl   = document.getElementById('score-bar');
    const statusTextEl = document.getElementById('status-text');
    const nearestBadge = document.getElementById('nearest-badge');
    const collectFlash = document.getElementById('collect-flash');
    const winScreen    = document.getElementById('win-screen');
    let collectedCount = 0;

    function showFlash(text) {
      collectFlash.textContent = text;
      collectFlash.style.animation = 'none';
      void collectFlash.offsetHeight; // force reflow to restart animation
      collectFlash.style.animation = 'floatUp 1.4s ease-out forwards';
      collectFlash.style.display   = 'block';
      setTimeout(() => { collectFlash.style.display = 'none'; }, 1500);
    }

    // ── Render loop ────────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      camera.updateFrame(renderer);

      if (gameStarted && collectedCount < TREASURES.length) {
        const t = Date.now() * 0.001;
        let closestDist  = Infinity;
        let closestLabel = '';

        orbs.forEach(orb => {
          if (orb.collected) return;

          // Pulse + spin animations
          const pulse = 1 + 0.12 * Math.sin(t * 2.4);
          orb.sphere.scale.setScalar(pulse);
          orb.halo.rotation.y = t * 1.6;
          orb.halo.rotation.x = Math.sin(t * 0.8) * 0.4;
          orb.light.intensity = 1.8 + 1.2 * Math.sin(t * 2.4);

          // Proximity check
          orb.group.getWorldPosition(orb.worldPos);
          const dist = camera.position.distanceTo(orb.worldPos);

          if (dist < closestDist) { closestDist = dist; closestLabel = orb.cfg.label; }

          if (dist < COLLECT_RADIUS) {
            orb.collected = true;
            orb.group.visible = false;
            collectedCount++;
            scoreBarEl.textContent = `${collectedCount} / ${TREASURES.length} collected`;
            showFlash(`⭐ ${orb.cfg.label} collected!`);
            if (collectedCount === TREASURES.length) {
              document.getElementById('hud').classList.remove('visible');
              winScreen.classList.add('visible');
            }
          }
        });

        // Nearest distance hint
        if (closestDist < Infinity) {
          nearestBadge.textContent = `${closestLabel} — ${closestDist.toFixed(1)} m`;
          if      (closestDist < 1.2) statusTextEl.textContent = 'Almost there!';
          else if (closestDist < 2.5) statusTextEl.textContent = 'Getting warmer…';
          else                        statusTextEl.textContent = 'Walk towards a glowing orb';
        }
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
